name: Sync YouTube Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Generate library.json
        run: |
          echo '{"tracks":[' > library.json

          yt-dlp --flat-playlist --dump-json "https://www.youtube.com/playlist?list=$(jq -r '.playlists[0].url' playlists.json | sed 's/.*list=//')" \
          | jq -c '{title: .title, id: .id}' \
          | head -n 100 \
          | awk '{
              if (NR > 1) printf ",";
              printf "{\"title\":%s,\"id\":%s}", $0
            }' >> library.json

          echo ']}' >> library.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add library.json
          git commit -m "update library" || echo "no changes"
          git push
