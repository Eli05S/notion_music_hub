name: Sync YouTube Playlist (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Generate library.json
        run: |
          echo '{"tracks":[' > library.json

          URL=$(grep -o '"url": *"[^"]*"' playlists.json | head -n1 | cut -d'"' -f4)

          yt-dlp --flat-playlist --dump-json "$URL" | while read -r line; do
            ID=$(echo "$line" | jq -r '.id')
            TITLE=$(echo "$line" | jq -r '.title')

            if [ "$ID" != "null" ]; then
              echo "{\"title\":\"$TITLE\",\"id\":\"$ID\"}," >> library.json
            fi
          done

          sed -i '$ s/,$//' library.json
          echo ']}' >> library.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add library.json
          git commit -m "update library" || echo "no changes"
          git push
